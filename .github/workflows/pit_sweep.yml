name: PIT Momentum Sweep

# 모멘텀 설계 스윕 전용. 입력 없이 "Run workflow"만 누르면 항상
# point-in-time S&P500 유니버스에서 여러 설계(lookback/top_n/skip)를
# EW 베이스라인과 비교한다. (sweep=true 토글을 깜빡하는 실수 원천 차단)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pit-sweep-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas numpy requests yfinance

      # PIT 가격 캐시 재사용(상폐 커버리지 누적).
      - name: Cache price data
        uses: actions/cache@v4
        with:
          path: backtest_us/data
          key: pitdata-${{ github.run_id }}
          restore-keys: |
            pitdata-
            stooq-

      - name: Run PIT momentum sweep
        run: |
          set -o pipefail
          python -m backtest_us.run --pit --sweep | tee /tmp/bt_out.txt

      - name: Write committed result
        run: |
          {
            echo "# 모멘텀 설계 스윕 — S&P500 point-in-time (생존편향-free)"
            echo ""
            echo "- 실행: $(date -u +'%Y-%m-%d %H:%M UTC') (GitHub Actions)"
            echo "- 브랜치: ${{ github.ref_name }}"
            echo ""
            echo '```'
            grep -v -E '^\[data\] (SKIP|yfinance)' /tmp/bt_out.txt
            echo '```'
          } > backtest_us/ci_results/latest_pit_sweep.md

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backtest_us/ci_results/latest_pit_sweep.md
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore(backtest_us): PIT momentum sweep $(date -u +%Y-%m-%d) [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push origin "HEAD:${{ github.ref_name }}"
          fi
