name: Export PIT Data Bundle

# 캐시된 PIT 가격을 압축 close 행렬(research_data/closes.csv.gz)로 레포에 커밋.
# 이걸 한 번 돌려두면, 네트워크 없는 샌드박스(Claude)가 이 번들로 무한히
# 백테스트·전략탐색을 자율 수행할 수 있다. 입력 없음 — 버튼만.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: export-bundle-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas numpy requests yfinance

      - name: Cache price data
        uses: actions/cache@v4
        with:
          path: backtest_us/data
          key: pitdata-${{ github.run_id }}
          restore-keys: |
            pitdata-
            stooq-

      - name: Export bundle
        run: |
          set -o pipefail
          python -m backtest_us.run --pit --export-bundle | tee /tmp/exp.txt

      - name: Commit bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f backtest_us/research_data/closes.csv.gz
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore(backtest_us): refresh research data bundle $(date -u +%Y-%m-%d) [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push origin "HEAD:${{ github.ref_name }}"
          fi
